aid: unit21
name: Unit21
description: >-
  Unit21 is an agentic AI platform for fraud and AML (Anti-Money Laundering)
  detection and compliance operations. It provides a REST API for ingesting
  transaction data, managing detection rules, reviewing alerts, and filing
  suspicious activity reports (SARs). The platform supports real-time
  transaction monitoring, case management, entity and instrument tracking,
  and automated regulatory filing including SARs, STRs, CTRs, and goAML reports.
