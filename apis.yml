    name: Unit21 API
    description: >-
      REST API for ingesting entities, instruments, and transaction events into
      the Unit21 risk and compliance platform. Enables creation and management
      of alerts, cases, rules, and suspicious activity reports. Supports
      real-time transaction monitoring and bulk data exports.
